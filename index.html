<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>my-3d-web</title>
    <style>
      /* Hapus total semua scrollbar horizontal dan vertikal dari seluruh halaman dan elemen anak */
      *::-webkit-scrollbar {
        display: none !important;
        width: 0px !important;
        height: 0px !important;
        background: transparent !important;
        -webkit-appearance: none !important;
      }
      * {
        scrollbar-width: none !important;
        -ms-overflow-style: none !important;
      }
      html, body, #root {
        width: 100% !important;
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        position: fixed !important;
        top: 0; left: 0; right: 0; bottom: 0;
      }
    </style>
  </head>
  <body style="margin:0;padding:0;overflow:hidden;background:#181c20;">
    <div id="root" style="width:100%;height:100%;overflow:hidden;"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
